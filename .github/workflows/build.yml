name: Build APK

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk zip unzip libffi-dev libssl-dev \
            autoconf libtool pkg-config cmake zlib1g-dev \
            libltdl-dev

      - name: Install buildozer
        run: pip install buildozer cython virtualenv

      - name: Run buildozer once to download SDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          timeout 300 buildozer android debug || true

      - name: Accept licenses and install build-tools into buildozer SDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          SDKMANAGER=$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
          if [ -f "$SDKMANAGER" ]; then
            yes | $SDKMANAGER --licenses
            $SDKMANAGER "build-tools;34.0.0"
          else
            echo "sdkmanager not found at $SDKMANAGER"
            find $HOME/.buildozer -name "sdkmanager" 2>/dev/null
          fi

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug 2>&1 | tee build.log

      - name: List output files
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: workout-coach-apk
          path: bin/*.apk
