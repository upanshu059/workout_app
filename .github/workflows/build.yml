name: Build APK

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk zip unzip libffi-dev libssl-dev \
            autoconf libtool pkg-config cmake zlib1g-dev \
            libltdl-dev

      - name: Install buildozer
        run: pip install buildozer cython virtualenv

      - name: Accept Android SDK licenses
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: List output files
        run: find . -name "*.apk" 2>/dev/null && ls -la bin/ 2>/dev/null || echo "No APK or bin folder found"
        continue-on-error: true

      - name: Upload full build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK if successful
        uses: actions/upload-artifact@v4
        with:
          name: workout-coach-apk
          path: bin/*.apk
